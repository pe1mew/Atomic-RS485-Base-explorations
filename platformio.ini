; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .

; ---------------------------------------------------------------------------
; Shared settings inherited by all environments
; ---------------------------------------------------------------------------
[env]
platform      = espressif32@6.3.2
board         = m5stack-atom
framework     = arduino
upload_speed  = 1500000
monitor_speed = 115200
build_flags   = -DCORE_DEBUG_LEVEL=5

; ---------------------------------------------------------------------------
; LED cycling demo (original hello-world project)
; ---------------------------------------------------------------------------
[env:helloWorld]
lib_deps   =
    M5Unified=https://github.com/m5stack/M5Unified
    fastled/FastLED
build_src_filter = -<*> +<helloWorld/>

; ---------------------------------------------------------------------------
; FG6485A temperature/humidity reader over Modbus RTU
; ---------------------------------------------------------------------------
[env:FG6485A]
lib_deps   =
    fastled/FastLED
build_src_filter = -<*> +<FG6485A/>

; ---------------------------------------------------------------------------
; Modbus RTU address scanner — sweeps addresses 1-247 and reports responders
; ---------------------------------------------------------------------------
[env:modbusScanner]
lib_deps   =
    fastled/FastLED
build_src_filter = -<*> +<modbusScanner/>

; ---------------------------------------------------------------------------
; Modbus RTU test client (slave) — replies to greenhouse-Controller LIB-6 test
; ---------------------------------------------------------------------------
[env:modbusTestClient]
lib_deps   =
    fastled/FastLED
build_src_filter = -<*> +<modbusTestClient/>

; ---------------------------------------------------------------------------
; Modbus RTU bus sniffer — passively prints all received frames to serial
; ---------------------------------------------------------------------------
[env:modbusReceiver]
lib_deps   =
    fastled/FastLED
build_src_filter = -<*> +<modbusReceiver/>
